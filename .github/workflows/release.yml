name: Auto Bump Version and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'SIAP-Automator.user.js' # Só roda se o script principal for alterado

jobs:
  bump-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Usa o token nativo para dar push de volta

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar incremento de versão
        run: node bump-version.js

      - name: Commitar nova versão
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SIAP-Automator.user.js
          git commit -m "chore: auto bump version [skip ci]"
          git push
